<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleção de Receita</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: #f9fafb;
      color: #111827;
    }

    main {
      width: 100%;
      max-width: 28rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .section-label {
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    /* Flavor grid */
    #flavor-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .flavor-btn {
      padding: 0.5rem 0.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .flavor-btn:hover:not(:disabled) {
      border-color: #10b981;
    }

    .flavor-btn.selected {
      background: #10b981;
      color: #fff;
      border-color: #10b981;
    }

    .flavor-btn:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      border-color: #e5e7eb;
      cursor: not-allowed;
    }

    /* Volume presets */
    .preset-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .preset-btn {
      flex: 1;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid #d1d5db;
      background: #fff;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .preset-btn:hover {
      background: #f3f4f6;
    }

    .preset-btn.selected {
      background: #10b981;
      color: #fff;
      border-color: #10b981;
    }

    /* Custom volume input */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #volume-input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.15s;
    }

    #volume-input:focus {
      box-shadow: 0 0 0 2px #10b981;
      border-color: #10b981;
    }

    .volume-unit {
      color: #6b7280;
      font-weight: 500;
    }

    /* Submit */
    #submit-btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: none;
      background: #10b981;
      color: #fff;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #submit-btn:hover:not(:disabled) {
      background: #059669;
    }

    #submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Status */
    #status-msg {
      text-align: center;
      font-size: 0.875rem;
      display: none;
    }

    #status-msg.success {
      color: #059669;
    }

    #status-msg.error {
      color: #ef4444;
    }
  </style>
</head>

<body>
  <main>
    <h1>Seleção de Receita</h1>

    <section>
      <p class="section-label">Sabor</p>
      <div id="flavor-grid"></div>
    </section>

    <section>
      <p class="section-label">Litragem</p>
      <div class="preset-row">
        <button type="button" class="preset-btn" data-vol="500">500 L</button>
        <button type="button" class="preset-btn" data-vol="1000">1000 L</button>
        <button type="button" class="preset-btn" data-vol="1400">1400 L</button>
      </div>
      <div class="volume-row">
        <input id="volume-input" type="number" min="1" max="1400" placeholder="Litragem personalizada">
        <span class="volume-unit">L</span>
      </div>
    </section>

    <button type="button" id="submit-btn" disabled>Iniciar Receita</button>
    <p id="status-msg"></p>
  </main>

  <script>
    const flavors = [
      { name: 'Coco', enabled: false },
      { name: 'Morango', enabled: true },
      { name: 'Maracujá', enabled: false },
      { name: 'Melancia', enabled: false },
      { name: 'Maçã Verde', enabled: false },
      { name: 'Pêssego c/ Morango', enabled: false },
      { name: 'Limão', enabled: false },
      { name: 'Laranja', enabled: false },
      { name: 'Pitaya', enabled: false },
    ];

    const grid = document.getElementById('flavor-grid');
    const volInput = document.getElementById('volume-input');
    const submitBtn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');

    let selectedFlavor = null;

    // Build flavor buttons
    flavors.forEach(f => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = f.name;
      btn.className = 'flavor-btn';
      btn.disabled = !f.enabled;

      if (f.enabled) {
        btn.addEventListener('click', () => {
          grid.querySelectorAll('.flavor-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedFlavor = f.name;
          checkReady();
        });
      }

      grid.appendChild(btn);
    });

    // Preset volume buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        volInput.value = btn.dataset.vol;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        checkReady();
      });
    });

    // Custom volume input
    volInput.addEventListener('input', () => {
      if (parseInt(volInput.value) > 1400) volInput.value = 1400;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
      checkReady();
    });

    function checkReady() {
      submitBtn.disabled = !(selectedFlavor && volInput.value && parseInt(volInput.value) > 0);
    }

    // Submit
    submitBtn.addEventListener('click', async () => {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando…';
      statusMsg.style.display = 'none';
      statusMsg.className = '';

      try {
        const params = new URLSearchParams({
          sabor: selectedFlavor,
          litragem: parseInt(volInput.value)
        });

        const res = await fetch(
          `http://factory.local:8000/api/recipes/start?${params.toString()}`,
          {
            method: 'POST'
          }
        );

        if (res.ok) {
          statusMsg.textContent = '✓ Enviado com sucesso!';
          statusMsg.className = 'success';
        } else {
          statusMsg.textContent = 'Erro ao enviar. Tente novamente.';
          statusMsg.className = 'error';
        }
      } catch {
        statusMsg.textContent = 'Erro de conexão.';
        statusMsg.className = 'error';
      }

      statusMsg.style.display = 'block';
      submitBtn.textContent = 'Iniciar Receita';
      checkReady();
    });
  </script>
</body>

</html>
